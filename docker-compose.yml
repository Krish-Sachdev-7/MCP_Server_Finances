services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: equitymcp
      POSTGRES_USER: equitymcp
      POSTGRES_PASSWORD: equitymcp_dev_password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U equitymcp"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  server:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - TRANSPORT=http
      - PORT=3000
      - DATABASE_URL=postgresql://equitymcp:equitymcp_dev_password@postgres:5432/equitymcp
      - REDIS_URL=redis://redis:6379
      - EQUITY_MCP_API_KEYS=dev-key-12345
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
  redisdata:
